<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cormorant Infant', serif;
            background-color: #b3e5fc; 
            text-align: center; 
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 50px; 
            font-size: 2.5em;
            color: #27b631; 
        }

        section {
            margin: 40px 0; /* Space between sections */
        }

        h2 {
            font-size: 2em; /* Section title size */
            color: #136407; /* Section title color */
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* Responsive grid */
            gap: 15px; /* Space between images */
            padding: 20px; /* Padding around the grid */
        }

        .gallery img {
            width: 100%; /* Responsive images */
            height: auto;
            border-radius: 0; /* No rounded corners */
            transition: transform 0.3s; /* Animation */
            cursor: pointer; /* Change cursor to pointer */
        }

        .gallery img:hover {
            transform: scale(1.05); /* Slight zoom effect on hover */
        }

        a {
            display: inline-block; /* Center the link */
            margin-top: 20px; /* Space above the link */
            text-decoration: none; /* Remove underline */
            color: #ff4081; /* Link color */
            font-size: 1.2em; /* Font size */
        }

        /* Lightbox Styles */
        .lightbox {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 999; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            background-color: rgba(0, 0, 0, 0.8); /* Black background with opacity */
            display: flex; /* Use Flexbox */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
        }

        .lightbox-content {
            max-width: 90%; /* Adjust based on your preference */
            max-height: 90%; /* Prevent overflow */
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Slideshow Styles */
        .slideshow-container {
            position: relative;
            max-width: 500px; /* Increased maximum width for larger images */
            margin: auto; /* Center the slideshow */
            overflow: hidden; /* Hide overflow */
            height: 500px; /* Fixed height to accommodate the largest image and spacing */
        }

        .mySlides {
            display: none; /* Hide all slides by default */
            text-align: center;
            height: 100%; /* Ensure the slideshow takes full height */
        }

        .mySlides img {
            max-width: 100%; /* Ensure images fill the container */
            max-height: 450px; /* Increased max height for larger images */
            height: auto; /* Allow height to adjust */
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 10px; /* Adjust padding for a smaller button */
            color: #136407; /* Green color for arrows */
            font-weight: bold;
            font-size: 22px; /* Increased font size for better visibility */
            border: none; /* Remove border */
            background-color: transparent; /* Remove background */
            transform: translateY(-50%); /* Center the buttons vertically */
            transition: opacity 0.2s ease; /* Smooth transition for hover */
        }

        .prev {
            left: 30px; /* Moved the left button further out */
        }

        .next {
            right: 30px; /* Moved the right button further out */
        }

        .prev:hover, .next:hover {
            opacity: 0.8; /* Change opacity on hover */
        }

        .photo-count {
            position: absolute;
            bottom: 10px; /* Position below the image */
            left: 20px;
            color: #136407; /* Set color to the same green shade */
            font-size: 18px;
            /* Removed background color and padding for a cleaner look */
        }
    </style>
</head>
<body>
    <h1>Photo Gallery</h1>

    <!-- Section 1: Summer in NYC -->
    <section>
        <h2>Summer in NYC</h2>
        <div class="gallery">
            <img src="./assets/summer in nyc/seb barbacuing.jpeg" alt="Nature Photo 1" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/seb rockaway from afar.jpeg" alt="Nature Photo 2" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/seb rockaway close up.jpeg" alt="Nature Photo 3" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/me and ella outside bar.jpeg" alt="Nature Photo 4" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/soy emma ella .jpeg" alt="Nature Photo 5" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/milla and seb elizabeth park.jpeg" alt="Nature Photo 6" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/margaux and seb.jpeg" alt="Nature Photo 7" onclick="openLightbox(this.src)">
            <img src="./assets/summer in nyc/seb real close up.jpeg" alt="Nature Photo 8" onclick="openLightbox(this.src)">
        </div>
    </section>

    <!-- Section 2: Landscapes -->
    <section>
        <h2>Landscapes</h2>
        <div class="gallery">
            <img src="./assets/photos/portrait1.jpg" alt="Portrait Photo 1" onclick="openLightbox(this.src)">
            <img src="./assets/photos/portrait2.jpg" alt="Portrait Photo 2" onclick="openLightbox(this.src)">
            <img src="./assets/photos/portrait3.jpg" alt="Portrait Photo 3" onclick="openLightbox(this.src)">
        </div>
    </section>

    <!-- Section 3: Portraits of Friends -->
    <section>
        <h2>Portraits of Friends</h2>
        <div class="slideshow-container">
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/ella portrait 1.jpeg" alt="Event Photo 1">
            </div>
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/ella portrait 2.jpeg" alt="Event Photo 2">
            </div>
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/emma close up.jpeg" alt="Event Photo 3">
            </div>
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/emma cig pretty.jpeg" alt="Event Photo 4">
            </div>
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/olivia close up.jpeg" alt="Event Photo 5">
            </div>
            <div class="mySlides fade">
                <img src="./assets/summer in nyc/emma on amit roof.jpeg" alt="Event Photo 6">
            </div>
    
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
    
            <div class="photo-count">
                <span id="currentSlideIndex">1</span> / <span id="totalSlides">6</span> <!-- Update total to 6 -->
            </div>
        </div>
    </section>
    

    <a href="index.html">Back to Home</a> <!-- Link back to the main page -->

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
        // Lightbox functionality
        function openLightbox(imgSrc) {
            document.getElementById("lightbox-img").src = imgSrc;
            document.getElementById("lightbox").style.display = "flex"; // Change to flex for centering
        }

        function closeLightbox(event) {
            // Check if the clicked element is the lightbox itself (not the image)
            if (event.target === document.getElementById("lightbox")) {
                document.getElementById("lightbox").style.display = "none";
            }
        }

        // Slideshow functionality
        let slideIndex = 1; // Start from the first slide
        showSlides(slideIndex); // Show the first slide on load

        function plusSlides(n) {
            showSlides(slideIndex += n); // Change slide index
        }

        function showSlides(n) {
            const slides = document.getElementsByClassName("mySlides");
            const currentSlideIndex = document.getElementById("currentSlideIndex");
            const totalSlides = document.getElementById("totalSlides");

            // Loop back to first slide if index is greater than total
            if (n > slides.length) {
                slideIndex = 1; // Reset to first slide if index is greater
            }
            // Loop back to last slide if index is less than 1
            if (n < 1) {
                slideIndex = slides.length; // Reset to last slide if index is less than 1
            }

            // Hide all slides and show the current one
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none"; // Hide all slides
            }
            slides[slideIndex - 1].style.display = "block"; // Show the current slide
            currentSlideIndex.textContent = slideIndex; // Update current slide index
            totalSlides.textContent = slides.length; // Update total slides
        }
    </script>
</body>
</html>
